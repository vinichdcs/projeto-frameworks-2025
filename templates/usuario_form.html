<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <title>Formulário de Usuário</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
      
      :root {
        --cor-principal: #e70b0b;
        --cor-secundaria: #00000000;
        --cor-fundo: #ffffff;
        --cor-texto: #000000;
      }
  
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
  
      body {
        font-family: 'Montserrat', sans-serif;
        background-color: var(--cor-fundo);
        color: var(--cor-texto);
      }
  
      main {
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 2rem;
      }
  
      h1 {
        color: var(--cor-principal);
        margin-bottom: 1rem;
      }
  
      form {
        background-color: rgb(248, 247, 247);
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgb(5, 5, 5);
      }
  
      label {
        font-weight: 600;
        display: block;
        margin-bottom: 0.5rem;
      }
  
      input, textarea, select {
        margin-bottom: 1rem;
        padding: 0.6rem;
        width: 100%;
        border: 1px solid #050505;
        border-radius: 6px;
      }
  
      .btn {
        padding: 0.6rem 1.2rem;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        margin-right: 0.5rem;
      }
  
      .btn-primary {
        background-color: var(--cor-principal);
        color: rgb(255, 248, 248);
      }
  
      .btn-secondary {
        background-color: #fffafa;
        color: rgb(0, 0, 0);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>{% if usuario %}Editar Usuário{% else %}Novo Usuário{% endif %}</h1>
      <form action="{% if usuario %}/usuario/editar/{{ usuario.id }}{% else %}/usuario/novo{% endif %}" method="POST">
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome" value="{{ usuario.nome if usuario else '' }}" required>
  
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" value="{{ usuario.email if usuario else '' }}" required>
  
        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" placeholder="{% if usuario %}Deixe em branco para manter a senha atual{% endif %}" required>
  
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/usuario" class="btn btn-secondary">Cancelar</a>
      </form>
    </main>
  </body>
</html>
